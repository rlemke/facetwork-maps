<!DOCTYPE html>
<html><head><meta charset='utf-8'><title>California cities by zoom</title>
<link href='https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css' rel='stylesheet'>
<script src='https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js' crossorigin='anonymous'></script>
<script src='https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js' crossorigin='anonymous'></script>
<style>html,body{margin:0;height:100%} #map{position:absolute;top:0;bottom:0;left:0;right:0}
#title{position:absolute;top:10px;left:50px;z-index:1;background:#fff;padding:8px 12px;border-radius:6px;
       box-shadow:0 2px 5px rgba(0,0,0,.3);font-family:Arial,sans-serif}
#title h3{margin:0;font-size:16px} #title small{color:#666}
#legend{position:absolute;bottom:14px;right:14px;z-index:1;background:rgba(20,20,22,.82);color:#eee;
        padding:8px 11px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,.4);font-family:Arial,sans-serif;
        font-size:12px;line-height:1.55}
#legend b{display:block;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#aaa;margin-bottom:4px}
#legend .row{display:flex;align-items:center;gap:7px}
#legend .sw{width:13px;height:13px;border-radius:3px;border:1px solid rgba(255,255,255,.35);flex:none}
#err{position:absolute;bottom:10px;left:10px;right:10px;z-index:2;background:#fee;color:#900;padding:8px;
     border:1px solid #c66;border-radius:4px;font-family:monospace;font-size:12px;display:none;white-space:pre-wrap}</style>
</head><body>
<div id='title'><h3>California cities by zoom</h3><small>vector tiles · zoom-tiled (only the current viewport is fetched) · <a href='https://protomaps.com/' target='_blank'>PMTiles</a> + <a href='https://maplibre.org/' target='_blank'>MapLibre</a></small></div>
<div id='legend'><b>Layers</b><div class='row'><span class='sw' style='background:#d62728'></span>cities 5M</div><div class='row'><span class='sw' style='background:#d62728'></span>cities 1M</div><div class='row'><span class='sw' style='background:#d62728'></span>cities 500K</div><div class='row'><span class='sw' style='background:#d62728'></span>cities 10K</div></div>
<div id='map'></div>
<div id='err'></div>
<script>
const eb=document.getElementById('err');
function showErr(m){eb.style.display='block';eb.textContent+=m+"\n"}
window.addEventListener('error',e=>showErr('JS error: '+(e.error&&e.error.stack||e.message)));
window.addEventListener('unhandledrejection',e=>showErr('promise: '+(e.reason&&e.reason.stack||e.reason)));
if(typeof maplibregl==='undefined') showErr('maplibregl global missing — CDN load failed');
if(typeof pmtiles==='undefined') showErr('pmtiles global missing — CDN load failed');
const here=location.origin+location.pathname.replace(/\/[^/]*$/,'/');
const protocol=new pmtiles.Protocol(); maplibregl.addProtocol('pmtiles', protocol.tile);
protocol.add(new pmtiles.PMTiles(here + 'tier_z3_tiles_cities_5M-z0_14.pmtiles'));
protocol.add(new pmtiles.PMTiles(here + 'tier_z6_tiles_cities_1M-z4_14.pmtiles'));
protocol.add(new pmtiles.PMTiles(here + 'tier_z8_tiles_cities_500K-z7_14.pmtiles'));
protocol.add(new pmtiles.PMTiles(here + 'tier_z10_tiles_cities_10K-z9_14.pmtiles'));
const map=new maplibregl.Map({
  container:'map',
  style:{
    version:8,
    glyphs:'https://protomaps.github.io/basemaps-assets/fonts/{fontstack}/{range}.pbf',
    sources:Object.assign({bg:{type:'raster',tiles:['https://a.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png','https://b.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png','https://c.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png','https://d.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png'],tileSize:256,attribution:'© OpenStreetMap © CARTO'}}, {layer0:{type:'vector', url:'pmtiles://' + here + 'tier_z3_tiles_cities_5M-z0_14.pmtiles'}, layer1:{type:'vector', url:'pmtiles://' + here + 'tier_z6_tiles_cities_1M-z4_14.pmtiles'}, layer2:{type:'vector', url:'pmtiles://' + here + 'tier_z8_tiles_cities_500K-z7_14.pmtiles'}, layer3:{type:'vector', url:'pmtiles://' + here + 'tier_z10_tiles_cities_10K-z9_14.pmtiles'}}),
    layers:[{id:'bg',type:'raster',source:'bg'}].concat([{id:'layer0-dot',type:'circle',source:'layer0','source-layer':'cities_5M',paint:{'circle-color':'#d62728','circle-radius':['interpolate',['linear'],['zoom'],3,3.5,6,5,10,7.5],'circle-stroke-color':'#0d0d0f','circle-stroke-width':1.4}},{id:'layer0-lbl',type:'symbol',source:'layer0','source-layer':'cities_5M',layout:{'text-field':['get','name'],'text-font':['Noto Sans Regular'],'text-size':11,'text-offset':[0.7,0],'text-anchor':'left','text-allow-overlap':false,'text-ignore-placement':false},paint:{'text-color':'#f2f2f2','text-halo-color':'#000','text-halo-width':1.3}},{id:'layer1-dot',type:'circle',source:'layer1','source-layer':'cities_1M',paint:{'circle-color':'#d62728','circle-radius':['interpolate',['linear'],['zoom'],3,3.5,6,5,10,7.5],'circle-stroke-color':'#0d0d0f','circle-stroke-width':1.4}},{id:'layer1-lbl',type:'symbol',source:'layer1','source-layer':'cities_1M',layout:{'text-field':['get','name'],'text-font':['Noto Sans Regular'],'text-size':11,'text-offset':[0.7,0],'text-anchor':'left','text-allow-overlap':false,'text-ignore-placement':false},paint:{'text-color':'#f2f2f2','text-halo-color':'#000','text-halo-width':1.3}},{id:'layer2-dot',type:'circle',source:'layer2','source-layer':'cities_500K',paint:{'circle-color':'#d62728','circle-radius':['interpolate',['linear'],['zoom'],3,3.5,6,5,10,7.5],'circle-stroke-color':'#0d0d0f','circle-stroke-width':1.4}},{id:'layer2-lbl',type:'symbol',source:'layer2','source-layer':'cities_500K',layout:{'text-field':['get','name'],'text-font':['Noto Sans Regular'],'text-size':11,'text-offset':[0.7,0],'text-anchor':'left','text-allow-overlap':false,'text-ignore-placement':false},paint:{'text-color':'#f2f2f2','text-halo-color':'#000','text-halo-width':1.3}},{id:'layer3-dot',type:'circle',source:'layer3','source-layer':'cities_10K',paint:{'circle-color':'#d62728','circle-radius':['interpolate',['linear'],['zoom'],3,3.5,6,5,10,7.5],'circle-stroke-color':'#0d0d0f','circle-stroke-width':1.4}},{id:'layer3-lbl',type:'symbol',source:'layer3','source-layer':'cities_10K',layout:{'text-field':['get','name'],'text-font':['Noto Sans Regular'],'text-size':11,'text-offset':[0.7,0],'text-anchor':'left','text-allow-overlap':false,'text-ignore-placement':false},paint:{'text-color':'#f2f2f2','text-halo-color':'#000','text-halo-width':1.3}}])
  },
  center:[-119.4,36.8], zoom:5.5
});
map.on('error',e=>showErr('map error: '+(e.error&&e.error.message||JSON.stringify(e))));
map.addControl(new maplibregl.NavigationControl());
map.addControl(new maplibregl.ScaleControl());
</script>
</body></html>
